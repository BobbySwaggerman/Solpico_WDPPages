            body{
                font-family: Arial, sans-serif;
                margin: 20px;
            }
            h2{
                color: 333;
            }
            table{
                border-collapse: collapse;
                width: 300px;
                margin-top: 20px;
            }
            td,th{
                border: 1px solid black;
                padding: 10px;
                text-align: center;
            }
            th{
                background-color: lightblue;
            }
        </style>

        <table id="studentTable">

        </table>

                     ];

</html>
